# PULSE — Effort Configuration
#
# Your efforts are the areas of your life you want to track and manage.
# Each effort gets a Map file that serves as its source of truth.
#
# Run /efforts to manage these — add, splinter, merge, or review.
#
# Fields:
#   name           — Human-readable name (used as Map title)
#   slug           — Lowercase, hyphenated identifier (used in frontmatter)
#   base_priority  — Life-importance anchor, 1-10 (10 = highest)
#   context_batch  — Group name for minimizing context switching
#   purpose        — One-line description of why this effort matters
#   aliases        — Optional flexible-match terms for /focus resolution

efforts:
  - name: "Work"
    slug: work
    base_priority: 9
    context_batch: Work
    purpose: "Primary professional obligation"
    aliases: [job, career]

  - name: "Life Maintenance"
    slug: maintenance
    base_priority: 7
    context_batch: Maintenance
    purpose: "Health, home, chores, admin — things that rot if ignored"
    aliases: [health, house, chores, admin]

  - name: "Personal Projects"
    slug: personal-projects
    base_priority: 5
    context_batch: Projects
    purpose: "Creative and growth work you do for yourself"
    aliases: [projects, hobby, side project]

# Context batches group efforts along two axes:
#   shared_context — the problem domain: tools, codebases, environments, stakeholder worlds
#   mindset       — the cognitive mode: energy state and type of thinking
#
# Domain (shared_context) is the primary axis. Switching domains forces a full mental
# model reload. Mindset is secondary — switching energy states within the same domain
# is cheaper than switching domains within the same energy state.

context_batches:
  - name: Work
    shared_context:
      - "IDE / terminal workflow"
      - "engineering mental models"
      - "team stakeholders and processes"
    mindset: "Analytical, execution-focused"

  - name: Maintenance
    shared_context:
      - "physical environment"
      - "bodily awareness"
      - "routines and logistics"
    mindset: "Practical, embodied"

  - name: Projects
    shared_context:
      - "personal codebases"
      - "creative tooling"
    mindset: "Creative, exploratory"
